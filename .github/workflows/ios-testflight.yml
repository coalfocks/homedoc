name: iOS TestFlight

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test -- --runInBand

      - name: Write App Store Connect API key
        run: |
          mkdir -p ios/certs
          printf '%s' "$ASC_API_KEY_P8" > ios/certs/AuthKey.p8
          chmod 600 ios/certs/AuthKey.p8
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}

      - name: Restore iOS signing credentials
        run: |
          mkdir -p ios/certs
          printf '%s' "$IOS_DIST_CERT_P12_BASE64" | base64 --decode > ios/certs/dist-cert.p12
          printf '%s' "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > ios/certs/profile.mobileprovision
          cat > credentials.json <<JSON
          {
            "ios": {
              "provisioningProfilePath": "ios/certs/profile.mobileprovision",
              "distributionCertificate": {
                "path": "ios/certs/dist-cert.p12",
                "password": "$IOS_DIST_CERT_PASSWORD"
              }
            }
          }
          JSON
          chmod 600 credentials.json ios/certs/dist-cert.p12 ios/certs/profile.mobileprovision
        env:
          IOS_DIST_CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}

      - name: Build and submit iOS
        run: eas build --platform ios --profile production --non-interactive --auto-submit --wait
        env:
          EXPO_TOKEN: ${{ secrets.EAS_TOKEN }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
