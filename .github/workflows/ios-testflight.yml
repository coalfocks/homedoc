name: iOS TestFlight

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test -- --runInBand

      - name: Write App Store Connect API key
        run: |
          printf '%s' "$ASC_API_KEY_P8" > "$RUNNER_TEMP/AuthKey.p8"
          chmod 600 "$RUNNER_TEMP/AuthKey.p8"
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}

      - name: Build and submit iOS
        run: eas build --platform ios --profile production --non-interactive --auto-submit --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EAS_TOKEN }}
          EXPO_ASC_API_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
          EXPO_ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          EXPO_ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          EXPO_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
