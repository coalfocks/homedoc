name: iOS TestFlight

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test -- --runInBand

      - name: Write App Store Connect API key
        run: |
          mkdir -p ios/certs
          printf '%s' "$ASC_API_KEY_P8" > ios/certs/AuthKey.p8
          chmod 600 ios/certs/AuthKey.p8
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}

      - name: Restore iOS signing credentials
        run: |
          mkdir -p ios/certs
          printf '%s' "$IOS_DIST_CERT_P12_BASE64" | base64 --decode > ios/certs/dist-cert.p12
          printf '%s' "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > ios/certs/profile.mobileprovision
          node <<'NODE'
          const fs = require('fs');

          const credentials = {
            ios: {
              provisioningProfilePath: 'ios/certs/profile.mobileprovision',
              distributionCertificate: {
                path: 'ios/certs/dist-cert.p12',
                password: process.env.IOS_DIST_CERT_PASSWORD,
              },
            },
          };

          fs.writeFileSync('credentials.json', `${JSON.stringify(credentials, null, 2)}\n`);
          NODE
          openssl pkcs12 -legacy -in ios/certs/dist-cert.p12 -clcerts -nokeys -passin "pass:$IOS_DIST_CERT_PASSWORD" >/tmp/homedoc-dist-cert.pem
          openssl x509 -in /tmp/homedoc-dist-cert.pem -noout -fingerprint -sha1
          chmod 600 credentials.json ios/certs/dist-cert.p12 ios/certs/profile.mobileprovision
        env:
          IOS_DIST_CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}

      - name: Build and submit iOS
        run: |
          set +e
          set -o pipefail
          eas build --platform ios --profile production --non-interactive --auto-submit --wait 2>&1 | tee eas-build-output.log
          status=${PIPESTATUS[0]}

          if [ "$status" -ne 0 ]; then
            build_url=$(grep -Eo 'https://expo.dev/accounts/[^ ]+/builds/[a-f0-9-]+' eas-build-output.log | tail -1)
            if [ -n "$build_url" ]; then
              build_id="${build_url##*/}"
              echo "EAS build id: $build_id"
              eas build:view "$build_id" --json > eas-build-view.json || true
              node -e "(async()=>{const fs=require('fs');if(!fs.existsSync('eas-build-view.json'))process.exit(0);const build=JSON.parse(fs.readFileSync('eas-build-view.json','utf8'));const logUrl=build.logFiles&&build.logFiles[0];if(!logUrl){console.log('No EAS log file URL found.');process.exit(0);}const response=await fetch(logUrl);const body=await response.text();const lines=body.trim().split(/\\r?\\n/);console.log('--- EAS remote build log tail ---');console.log(lines.slice(-260).join('\\n'));})().catch(e=>console.log('Failed to fetch EAS remote log: '+e.message));"
            fi
          fi

          exit "$status"
        env:
          EXPO_TOKEN: ${{ secrets.EAS_TOKEN }}
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
